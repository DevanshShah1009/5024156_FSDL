<!DOCTYPE html>
<html>
<head>
    <title>Square Color Change</title>
</head>

<body>

<!-- CENTER CONTAINER -->
<div 
    style="
        height:100vh;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        gap:15px;
    ">

    <!-- SQUARE -->
    <div id="colorSquare"
         style="
            width:150px;
            height:150px;
            background-color:red;
         ">
    </div>

    <!-- BUTTON BELOW SQUARE -->
    <button id="colorBtn">Click here to Change Color</button>

</div>

<script src="MAIN.js"></script>

</body>
</html>
