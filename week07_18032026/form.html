<!DOCTYPE html>
<html>
<head>
    <title>JS Error Handling </title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            text-align: center;
            margin-top: 50px;
        }
        .container {
            background: white;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 8px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
        #output {
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>

<body>
<h1>JavaScript Error Handling </h1>
<div class="container">
    <form id="userForm">
        <input type="text" id="name" placeholder="Enter Name"><br>
        <input type="number" id="age" placeholder="Enter Age"><br>
        <button type="submit">Submit</button>
    </form>
    <p id="output"></p>
</div>
<script src="script.js"></script>
</body>
</html>
